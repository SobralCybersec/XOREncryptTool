# Sigma Rules for Crypter Detection
# Compatible with: Splunk, Elastic, QRadar, ArcSight
# Based on 2026 threat intelligence

---
title: Process Injection via CreateRemoteThread
id: 3f3f3f3f-1111-2222-3333-444444444444
status: stable
description: Detects process injection using CreateRemoteThread API
references:
    - https://attack.mitre.org/techniques/T1055/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.defense_evasion
    - attack.t1055
logsource:
    product: windows
    service: sysmon
detection:
    selection_api:
        EventID: 8  # CreateRemoteThread
    selection_target:
        TargetImage|contains:
            - 'explorer.exe'
            - 'svchost.exe'
            - 'lsass.exe'
    selection_source:
        SourceImage|contains:
            - 'powershell.exe'
            - 'cmd.exe'
            - 'wscript.exe'
    condition: selection_api and (selection_target or selection_source)
falsepositives:
    - Legitimate debugging tools
    - Security software
level: high

---
title: APC Injection via NtQueueApcThread
id: 4f4f4f4f-2222-3333-4444-555555555555
status: experimental
description: Detects APC-based injection using NtQueueApcThread
references:
    - https://attack.mitre.org/techniques/T1055/004/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.defense_evasion
    - attack.t1055.004
logsource:
    product: windows
    service: sysmon
detection:
    selection_process:
        EventID: 10  # ProcessAccess
        GrantedAccess: '0x1FFFFF'
    selection_call:
        CallTrace|contains: 'ntdll.dll!NtQueueApcThread'
    condition: selection_process and selection_call
falsepositives:
    - Rare legitimate use cases
level: critical

---
title: Memory Protection Change RW to RX
id: 5f5f5f5f-3333-4444-5555-666666666666
status: stable
description: Detects memory fluctuation (RW -> RX transitions)
references:
    - https://github.com/Uwmtor/Shellcode-Memory-Fluctuation
author: Defensive Team
date: 2026/01/01
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    product: windows
    service: sysmon
detection:
    selection_access:
        EventID: 10  # ProcessAccess
        GrantedAccess: '0x0020'  # PROCESS_VM_OPERATION
    selection_protect:
        CallTrace|contains: 'kernel32.dll!VirtualProtect'
    timeframe: 5s
    condition: selection_access and selection_protect | count() > 3
falsepositives:
    - JIT compilers (.NET, Java)
    - Legitimate packers
level: high

---
title: Process Hollowing Detection
id: 6f6f6f6f-4444-5555-6666-777777777777
status: stable
description: Detects process hollowing technique
references:
    - https://attack.mitre.org/techniques/T1055/012/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.defense_evasion
    - attack.t1055.012
logsource:
    product: windows
    service: sysmon
detection:
    selection_create:
        EventID: 1  # ProcessCreate
        CommandLine|contains: 'CREATE_SUSPENDED'
    selection_unmap:
        EventID: 10  # ProcessAccess
        CallTrace|contains: 'ntdll.dll!NtUnmapViewOfSection'
    selection_write:
        EventID: 10
        GrantedAccess: '0x0010'  # PROCESS_VM_WRITE
    timeframe: 10s
    condition: selection_create and selection_unmap and selection_write
falsepositives:
    - Rare legitimate use cases
level: critical

---
title: PEB Walk API Resolution
id: 7f7f7f7f-5555-6666-7777-888888888888
status: experimental
description: Detects PEB walk for API resolution (evasion technique)
references:
    - https://www.ired.team/offensive-security/defense-evasion/peb-walk
author: Defensive Team
date: 2026/01/01
tags:
    - attack.defense_evasion
    - attack.t1106
logsource:
    product: windows
    service: sysmon
detection:
    selection_image:
        EventID: 1  # ProcessCreate
        Image|endswith: '.exe'
    selection_imports:
        # Process with very few imports (< 5)
        ImportedFunctions|count: < 5
    selection_memory:
        EventID: 10  # ProcessAccess
        CallTrace|contains:
            - '__readgsqword'
            - '__readfsdword'
    condition: selection_image and selection_imports and selection_memory
falsepositives:
    - Minimalist applications
level: high

---
title: Polymorphic Code Execution
id: 8f8f8f8f-6666-7777-8888-999999999999
status: experimental
description: Detects polymorphic code generation patterns
references:
    - https://attack.mitre.org/techniques/T1027/002/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.defense_evasion
    - attack.t1027.002
logsource:
    product: windows
    service: sysmon
detection:
    selection_alloc:
        EventID: 10  # ProcessAccess
        GrantedAccess: '0x0040'  # PROCESS_VM_WRITE + EXECUTE
    selection_entropy:
        # High entropy in memory regions
        Entropy: > 7.5
    selection_rwx:
        # RWX memory pages
        Protection: 'PAGE_EXECUTE_READWRITE'
    condition: selection_alloc and (selection_entropy or selection_rwx)
falsepositives:
    - JIT compilers
    - Legitimate packers
level: medium

---
title: Suspicious Office Process Spawning Script
id: 9f9f9f9f-7777-8888-9999-aaaaaaaaaaaa
status: stable
description: Detects Office applications spawning script interpreters
references:
    - https://attack.mitre.org/techniques/T1566/001/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.execution
    - attack.t1566.001
logsource:
    product: windows
    service: sysmon
detection:
    selection_parent:
        EventID: 1  # ProcessCreate
        ParentImage|contains:
            - 'winword.exe'
            - 'excel.exe'
            - 'powerpnt.exe'
            - 'outlook.exe'
    selection_child:
        Image|contains:
            - 'powershell.exe'
            - 'cmd.exe'
            - 'wscript.exe'
            - 'cscript.exe'
            - 'mshta.exe'
    condition: selection_parent and selection_child
falsepositives:
    - Legitimate macros (rare)
level: high

---
title: Encoded PowerShell Command
id: afafafafaf-8888-9999-aaaa-bbbbbbbbbbbb
status: stable
description: Detects encoded PowerShell commands (obfuscation)
references:
    - https://attack.mitre.org/techniques/T1059/001/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 1  # ProcessCreate
        Image|contains: 'powershell.exe'
        CommandLine|contains:
            - '-enc'
            - '-encodedcommand'
            - '-e '
            - 'FromBase64String'
    condition: selection
falsepositives:
    - Legitimate administrative scripts
level: medium

---
title: Suspicious Registry Run Key Persistence
id: bfbfbfbfbf-9999-aaaa-bbbb-cccccccccccc
status: stable
description: Detects persistence via Run registry keys
references:
    - https://attack.mitre.org/techniques/T1547/001/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 13  # RegistryEvent
        TargetObject|contains:
            - 'CurrentVersion\Run'
            - 'CurrentVersion\RunOnce'
    filter:
        Image|contains:
            - 'C:\Windows\System32\'
            - 'C:\Program Files\'
    condition: selection and not filter
falsepositives:
    - Legitimate software installation
level: medium

---
title: LSASS Memory Access
id: cfcfcfcfcf-aaaa-bbbb-cccc-dddddddddddd
status: stable
description: Detects credential dumping via LSASS access
references:
    - https://attack.mitre.org/techniques/T1003/001/
author: Defensive Team
date: 2026/01/01
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 10  # ProcessAccess
        TargetImage|contains: 'lsass.exe'
        GrantedAccess|contains:
            - '0x1010'
            - '0x1410'
            - '0x1438'
    filter:
        SourceImage|contains:
            - 'C:\Windows\System32\'
            - 'C:\Program Files\Windows Defender\'
    condition: selection and not filter
falsepositives:
    - Security software
    - Debugging tools
level: critical
